; =========================
; IMAGE 設定
; =========================
[IMAGE]
input_path = ./data/input2.jpg      ; 輸入影像檔案路徑 (jpg/png/bmp)
output_path = ./data/output/output2.jpg ; 輸出影像路徑
; resize_width = 640                ; 可選：寬度，沒設定則保留原始尺寸
; resize_height = 480               ; 可選：高度，沒設定則保留原始尺寸
gray_scale = False                  ; True -> 轉灰階, False -> 保留彩色

; =========================
; PREPROCESSING 前處理
; =========================
[PREPROCESSING]
denoise = True                       ; 是否進行去噪
denoise_method = gaussian            ; 去噪方法: gaussian / median

; =========================
; FEATURE 特徵萃取
; =========================
[FEATURE]
method = ORB                         ; 特徵點方法: ORB / SIFT
max_features = 500                   ; 最大特徵點數量