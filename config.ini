; =========================
; IMAGE 設定
; =========================
[IMAGE]

; 輸入影像檔案路徑 (jpg/png/bmp)
input_path = ./data/input2.jpg

; 輸出影像路徑
output_path = ./data/output/output2.jpg

; diff 輸出路徑
diff_path = ./data/output/diff2.jpg

; 可選 resize，沒設定則保留原始尺寸
; resize_width = 640
; resize_height = 480

; True -> 轉灰階, False -> 保留彩色
gray_scale = False

; =========================
; PREPROCESSING 前處理
; =========================
[PREPROCESSING]

; 是否進行去噪
denoise = False

; 去噪方法: gaussian / median
denoise_method = gaussian

; =========================
; FEATURE 特徵萃取
; =========================
[FEATURE]

; 特徵點方法: ORB / SIFT
method = ORB

; 最大特徵點數量
max_features = 500