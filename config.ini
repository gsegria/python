; =========================
; GENERAL 運行模式
; =========================
[GENERAL]
; 運行模式: image / video
; auto → 自動判斷副檔名
; image → 強制圖片模式
; video → 強制影片模式
mode = video

; =========================
; IMAGE 設定
; =========================
[IMAGE]
; 圖片輸入檔案路徑（jpg / png / bmp）
input_path = ./data/input1.jpg

; 圖片輸出完整檔名
output_path = ./data/output/output_image.jpg

; diff 輸出（僅 image 使用）
diff_path = ./data/output/diff_image.jpg

; 是否轉灰階
gray_scale = False

; Resize（可選）
; resize_width = 640
; resize_height = 480

; =========================
; VIDEO 設定
; =========================
[VIDEO]
; 影片輸入檔案路徑（mp4 / avi / mov / mkv）
input_path = ./data/input_video.mp4

; 影片輸出資料夾（必須是資料夾，不可帶檔名）
output_path = ./data/output/

; 輸出影片名稱
output_video_name = output_video.mp4

; diff 影片名稱
diff_video_name = diff_video.mp4

; FPS（未設定則使用原影片 FPS）
; fps = 30

; 是否輸出 diff video
enable_diff = True

; =========================
; PREPROCESSING 前處理（共用）
; =========================
[PREPROCESSING]
; 是否去噪
denoise = False

; 去噪方法
; gaussian / median
denoise_method = gaussian

; =========================
; FEATURE 特徵萃取（共用）
; =========================
[FEATURE]
; ORB / SIFT
method = ORB

; 最大特徵點數
max_features = 500

; diff visualization threshold
diff_threshold = 15

; 是否使用 morphological 擴大差異區域  True ; False
diff_morph = False